services:
  - type: web
    name: iceberg-api
    env: node
    plan: free
    region: frankfurt
    buildCommand: cd backend && npm ci && npm run build
    startCommand: node backend/dist/main.js
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false
