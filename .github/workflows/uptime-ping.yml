name: Uptime ping

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          curl -fsS --retry 3 --retry-delay 5 "https://iceberg-api-8s7s.onrender.com/health" >/dev/null
          echo "Pinged https://iceberg-api-8s7s.onrender.com/health OK"
