name: Uptime ping

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        env:
          API_URL: ${{ secrets.RENDER_API_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "RENDER_API_URL secret is not set — skipping ping."
            exit 0
          fi
          curl -fsS --retry 3 --retry-delay 5 "$API_URL/health" >/dev/null
          echo "Pinged $API_URL/health OK"
